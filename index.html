<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Filmes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <h1>CineMatch Pro</h1>

            <ul>
                <li><a href="index.html">Cadastro</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="https://www.imdb.com/chart/top/" target="_blank">Sugestões</a></li>
            </ul>
        </div>
    </nav>
    <main class="container">
        <section>
            <h2>Cadastrar Filme</h2>

            <form id="filmeForm">
                <label for="titulo">Título:</label>
                <input id="titulo" required>

                <label for="genero">Gênero:</label>
                <input id="genero" required>

                <label for="minutos">Minutos:</label>
                <input type="number" id="minutos" required>

                <label for="capa">URL da Capa:</label>
                <input id="capa" required>

                <label for="trailer">ID do YouTube:</label>
                <input id="trailer" required>

                <button type="submit">Salvar Filme</button>
            </form>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
